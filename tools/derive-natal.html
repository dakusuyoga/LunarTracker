<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Natal chart derivation</title></head>
<body>
<pre id="out">computing…</pre>
<script src="../astronomy.browser.js"></script>
<script>
// Derives the natal planet longitudes and Placidus house cusps that are
// hardcoded in data.js. Open this file via a local server and copy the output.
//
// Birth: December 5, 1980, 17:25 CET (UTC+1) => 16:25 UTC
// Place: Beelitz-Heilstätten, Germany — 52.267 N, 12.933 E

const DEG = Math.PI / 180;
const norm360 = x => ((x % 360) + 360) % 360;

const birthUTC = new Date(Date.UTC(1980, 11, 5, 16, 25, 0));
const time = Astronomy.MakeTime(birthUTC);
const latitude = 52.267, longitude = 12.933;

// --- Geocentric true-ecliptic-of-date longitudes ---
function planetLon(body) {
  if (body === 'Sun') return Astronomy.SunPosition(time).elon;
  if (body === 'Moon') return Astronomy.EclipticGeoMoon(time).lon;
  const vec = Astronomy.GeoVector(body, time, true);
  return Astronomy.Ecliptic(vec).elon;
}

const bodies = ['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto'];
const natal = {};
for (const b of bodies) natal[b] = planetLon(b);

// --- Obliquity of date (IAU 2006 mean obliquity; nutation ~9" ignored) ---
const T = (time.tt) / 36525.0; // Julian centuries TT since J2000
const epsDeg = 23.439279444444445 - (46.836769*T + 0.0001831*T*T - 0.00200340*T*T*T)/3600;
const eps = epsDeg * DEG;

// --- RAMC from apparent sidereal time ---
const gast = Astronomy.SiderealTime(time); // hours
const ramc = norm360(gast * 15 + longitude);

// RA & declination of an ecliptic point at longitude lam (beta = 0)
function raDec(lam) {
  const L = lam * DEG;
  const ra = norm360(Math.atan2(Math.sin(L) * Math.cos(eps), Math.cos(L)) / DEG);
  const dec = Math.asin(Math.sin(eps) * Math.sin(L));
  return { ra, dec };
}

// Hour angle of the point (degrees, normalized to (-180, 180], west positive)
function hourAngle(lam) {
  let h = norm360(ramc - raDec(lam).ra);
  if (h > 180) h -= 360;
  return h;
}

// Placidus target hour angle for a given cusp, as a function of declination.
// SAd = semi-diurnal arc, SAn = semi-nocturnal arc.
function targetH(cusp, dec) {
  const x = -Math.tan(latitude * DEG) * Math.tan(dec);
  const sad = Math.acos(Math.max(-1, Math.min(1, x))) / DEG;
  const san = 180 - sad;
  switch (cusp) {
    case 10: return 0;
    case 11: return -sad / 3;        // 1/3 of diurnal arc east of MC
    case 12: return -2 * sad / 3;
    case 1:  return -sad;            // horizon (ascendant)
    case 2:  return -(sad + san / 3);
    case 3:  return -(sad + 2 * san / 3);
  }
}

// Solve hourAngle(lam) == targetH(cusp, dec(lam)) by scan + bisection.
function solveCusp(cusp) {
  const f = lam => {
    let d = hourAngle(lam) - targetH(cusp, raDec(lam).dec);
    d = norm360(d);
    if (d > 180) d -= 360;
    return d;
  };
  const roots = [];
  let prev = f(0);
  for (let lam = 0.25; lam <= 360; lam += 0.25) {
    const cur = f(norm360(lam));
    if (prev < 0 !== cur < 0 && Math.abs(cur - prev) < 180) {
      let lo = lam - 0.25, hi = lam;
      for (let i = 0; i < 60; i++) {
        const mid = (lo + hi) / 2;
        if (f(norm360(mid)) < 0 === f(norm360(lo)) < 0) lo = mid; else hi = mid;
      }
      roots.push(norm360((lo + hi) / 2));
    }
    prev = cur;
  }
  return roots;
}

// MC directly: RA of MC = RAMC
const mc = norm360(Math.atan2(Math.sin(ramc * DEG), Math.cos(ramc * DEG) * Math.cos(eps)) / DEG);
// ASC closed form for cross-check
const ascClosed = norm360(Math.atan2(
  Math.cos(ramc * DEG),
  -(Math.sin(ramc * DEG) * Math.cos(eps) + Math.tan(latitude * DEG) * Math.sin(eps))
) / DEG);

const SIGNS = ['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];
function fmt(lon) {
  const s = SIGNS[Math.floor(norm360(lon) / 30)];
  const inSign = norm360(lon) % 30;
  const d = Math.floor(inSign), m = ((inSign - d) * 60);
  return `${norm360(lon).toFixed(4)}°  =  ${d}°${m.toFixed(1).padStart(4,'0')}' ${s}`;
}

let out = `Birth UTC: ${birthUTC.toISOString()}\nGAST: ${gast.toFixed(6)} h   RAMC: ${ramc.toFixed(4)}°   eps: ${epsDeg.toFixed(6)}°\n\nPLANETS (tropical, true ecliptic of date):\n`;
for (const b of bodies) out += `  ${b.padEnd(8)} ${fmt(natal[b])}\n`;

out += `\nANGLES:\n  MC       ${fmt(mc)}\n  ASC(cf)  ${fmt(ascClosed)}\n\nPLACIDUS CUSPS (roots per cusp — pick the one on the correct side):\n`;
for (const c of [1, 2, 3, 10, 11, 12]) {
  out += `  cusp ${String(c).padStart(2)}: ${solveCusp(c).map(r => fmt(r)).join('   |   ')}\n`;
}
out += `\nOpposite cusps: 4=10+180, 5=11+180, 6=12+180, 7=1+180, 8=2+180, 9=3+180`;

document.getElementById('out').textContent = out;
</script>
</body>
</html>
